version: '3.9'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: voucher-backend
    ports:
      - '8000:8000'
    volumes:
      - ./backend/database:/app/database   # persist SQLite across restarts
    environment:
      - APP_ENV=local
      - APP_DEBUG=true

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: voucher-frontend
    ports:
      - '5173:5173'
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_BASE_URL=http://backend:8000
    depends_on:
      - backend
